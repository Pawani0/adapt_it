name: Daily Aptitude Quiz Dispatcher

on:
  schedule:
    # Runs daily at 8:00 AM IST (2:30 AM UTC)
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dispatch-quiz:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Flask daily quiz job
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          QUIZ_BASE_URL: ${{ secrets.QUIZ_BASE_URL }}
        run: |
          curl --fail --show-error --request POST \
            --header "X-API-Key: $ADMIN_API_KEY" \
            "$QUIZ_BASE_URL/api/run-daily-quiz"

      - name: Wait for daily quiz job to finish
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          QUIZ_BASE_URL: ${{ secrets.QUIZ_BASE_URL }}
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl --silent --show-error \
              --header "X-API-Key: $ADMIN_API_KEY" \
              "$QUIZ_BASE_URL/api/run-daily-quiz/status")
            echo "$STATUS"

            if echo "$STATUS" | grep -q '"last_state": "running"'; then
              sleep 10
              continue
            fi

            if echo "$STATUS" | grep -q '"last_state": "succeeded"'; then
              exit 0
            fi

            if echo "$STATUS" | grep -q '"last_state": "failed"'; then
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for daily quiz job"
          exit 1
