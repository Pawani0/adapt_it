name: Daily Aptitude Quiz Dispatcher

on:
  schedule:
    # Runs daily at 8:00 AM IST (2:30 AM UTC)
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dispatch-quiz:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Flask daily quiz job
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          QUIZ_BASE_URL: ${{ secrets.QUIZ_BASE_URL }}
        run: |
          curl --fail --show-error --request POST \
            --header "X-API-Key: $ADMIN_API_KEY" \
            "$QUIZ_BASE_URL/api/run-daily-quiz"
