name: Daily Aptitude Quiz Dispatcher

on:
  schedule:
    # Runs daily at 8:00 AM IST (2:30 AM UTC)
    - cron: '30 2 * * *'
  workflow_dispatch:
    # Allows manual triggering of the quiz workflow from the GitHub UI

jobs:
  dispatch-quiz:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Orchestrator
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        QUIZ_BASE_URL: ${{ secrets.QUIZ_BASE_URL }}
        ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        QUIZ_QUESTION_COUNT: ${{ vars.QUIZ_QUESTION_COUNT || '15' }}
        QUIZ_TIME_LIMIT_MINUTES: ${{ vars.QUIZ_TIME_LIMIT_MINUTES || '15' }}
        QUIZ_SUBMISSION_BUFFER_SECONDS: ${{ vars.QUIZ_SUBMISSION_BUFFER_SECONDS || '45' }}
        QUIZ_RESULT_DEADLINE_HOURS: ${{ vars.QUIZ_RESULT_DEADLINE_HOURS || '12' }}
        QUIZ_TOPICS: ${{ vars.QUIZ_TOPICS }}
      run: python main.py

    - name: Commit and push tracking files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add sent_log.json
        if [ -f candidate_memory.json ]; then
          git add candidate_memory.json
        fi
        # Only commit and push if there are changes
        if git diff --cached --quiet; then
          echo "No changes tracking files to commit."
        else
          git commit -m "Update tracking files - [skip ci]"
          git push
        fi
