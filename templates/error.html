<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --surface: #0f0f0f;
            --border: #1c1c1c;
            --text: #f0ece4;
            --text-muted: #585450;
            --text-dim: #2e2c2a;
            --red: #a05050;
            --red-border: rgba(160, 80, 80, 0.25);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image: radial-gradient(circle, #141412 1px, transparent 1px);
            background-size: 22px 22px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            border: 1px solid var(--red-border);
            animation: up 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .accent-rule { height: 2px; background: var(--red); }

        .card-inner { padding: 40px; }

        .eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 9.5px;
            letter-spacing: 0.18em;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 34px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 18px;
        }

        h1 em {
            font-style: italic;
            font-weight: 400;
        }

        .message {
            font-size: 13.5px;
            font-weight: 300;
            color: var(--text-muted);
            line-height: 1.65;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            margin-bottom: 28px;
        }

        .btn-back {
            display: inline-block;
            padding: 11px 22px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-back:hover {
            border-color: var(--text-muted);
            color: var(--text);
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="accent-rule"></div>
        <div class="card-inner">
            <p class="eyebrow">Attention Required</p>
            <h1>Something<br>went <em>wrong.</em></h1>
            <p class="message">{{ message }}</p>
            <a href="javascript:history.back()" class="btn-back">← Go Back</a>
        </div>
    </div>
</body>
</html>
