services:
  - type: web
    name: daily-aptitude-quiz
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    disk:
      name: quiz-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: QUIZ_DB_FILE
        value: /var/data/quiz.db
      - key: CANDIDATE_MEMORY_FILE
        value: /var/data/candidate_memory.json
