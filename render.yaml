services:
  - type: web
    name: daily-aptitude-quiz
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: QUIZ_QUESTION_COUNT
        value: 15
      - key: QUIZ_TIME_LIMIT_MINUTES
        value: 15
      - key: QUIZ_SUBMISSION_BUFFER_SECONDS
        value: 45
      - key: QUIZ_RESULT_DEADLINE_HOURS
        value: 12
      - key: QUIZ_DEADLINE_HOUR
        value: 21
      - key: QUIZ_DEADLINE_MINUTE
        value: 0
      - key: ADMIN_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: QUIZ_BASE_URL
        sync: false
